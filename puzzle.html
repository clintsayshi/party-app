<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>Live Cam Slide Puzzle | Interactive 5x5 Grid Game</title>
  <meta name="title" content="Live Cam Slide Puzzle | Interactive 5x5 Grid Game">
  <meta name="description" content="A real-time interactive slide puzzle game using your webcam. Shuffle, solve, and save your puzzle portrait in this 5x5 grid challenge built with p5.js.">
  <meta name="keywords" content="p5.js, slide puzzle, webcam game, interactive art, 15 puzzle, 25 puzzle, generative art">
  <meta name="author" content="Your Name/Brand">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://party-app-tau.vercel.app/">
  <meta property="og:title" content="Live Cam Slide Puzzle">
  <meta property="og:description" content="Can you solve the puzzle? Play a real-time slide puzzle using your live camera feed. Solve it to save your portrait!">
  <meta property="og:image" content="thumbnail-preview.jpg">

  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="Live Cam Slide Puzzle">
  <meta property="twitter:description" content="Interactive 5x5 slide puzzle game using your live camera feed. Solve the grid and download your photo.">

  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/addons/p5.sound.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #141414;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    canvas {
      display: block;
      touch-action: none; /* Crucial: stops the browser from intercepting swipes */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .save-button {
      background-color: #00ff96 !important;
      color: #141414 !important;
      padding: 12px 24px !important;
      border: none !important;
      border-radius: 8px !important;
      font-weight: bold !important;
      cursor: pointer !important;
      font-size: 16px !important;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>

<body>
  <script>
    let cam;
    let tiles = [];
    let board = [];
    let cols = 4;
    let rows = 4;
    let w, h;
    let totalTiles = 16;
    let puzzleSize;
    let saveBtn;
    let puzzleSolved = false;

    // Swipe tracking
    let touchStartX = 0;
    let touchStartY = 0;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      updateLayout();
      
      cam = createCapture(VIDEO);
      cam.size(640, 480); // Higher res internally for better cropping
      cam.hide();

      // Setup tiles
      for (let i = 0; i < totalTiles; i++) {
        let x = (i % cols) * w;
        let y = floor(i / cols) * h;
        tiles.push(new Tile(i, x, y));
        board.push(i);
      }

      saveBtn = createButton('SAVE IMAGE');
      saveBtn.class('save-button');
      saveBtn.mousePressed(savePuzzleImage);
      saveBtn.hide();

      shuffleBoard();
    }

    function updateLayout() {
      // Responsive: 90% of width on small screens, max 450px on desktops
      puzzleSize = min(windowWidth * 0.9, 450);
      w = puzzleSize / cols;
      h = puzzleSize / rows;
    }

    function draw() {
      background(20);

      let offsetX = (width - puzzleSize) / 2;
      let offsetY = (height - puzzleSize) / 2;

      if (cam.width === 0) {
        fill(255);
        textAlign(CENTER, CENTER);
        text("Accessing Camera...", width / 2, height / 2);
        return;
      }

      push();
      translate(offsetX, offsetY);
      
      for (let i = 0; i < board.length; i++) {
        let tileIndex = board[i];
        if (tileIndex !== -1) {
          let x = (i % cols) * w;
          let y = floor(i / cols) * h;
          tiles[tileIndex].display(x, y);
        }
      }

      if (puzzleSolved) {
        // Complete the image
        tiles[totalTiles - 1].display(w * (cols - 1), h * (rows - 1));
        
        fill(0, 255, 150, 200);
        rect(0, puzzleSize * 0.42, puzzleSize, puzzleSize * 0.16, 8);
        fill(255);
        textAlign(CENTER, CENTER);
        textSize(puzzleSize * 0.08);
        text("SOLVED!", puzzleSize / 2, puzzleSize / 2);
      }
      pop();
    }

    // --- INTERACTION LOGIC (SWIPE & TAP) ---

    function touchStarted() {
      touchStartX = mouseX;
      touchStartY = mouseY;
      return false; // Prevent scrolling
    }

    function touchEnded() {
      if (puzzleSolved) return false;

      let dx = mouseX - touchStartX;
      let dy = mouseY - touchStartY;

      // Tap Detection
      if (abs(dx) < 15 && abs(dy) < 15) {
        let offsetX = (width - puzzleSize) / 2;
        let offsetY = (height - puzzleSize) / 2;
        let mX = mouseX - offsetX;
        let mY = mouseY - offsetY;

        if (mX > 0 && mX < puzzleSize && mY > 0 && mY < puzzleSize) {
          let i = floor(mX / w);
          let j = floor(mY / h);
          moveTile(i + j * cols);
        }
      } 
      // Swipe Detection
      else {
        let blankIdx = findEmpty();
        let bX = blankIdx % cols;
        let bY = floor(blankIdx / cols);
        let targetIdx = -1;

        if (abs(dx) > abs(dy)) {
          // Horizontal
          if (dx > 0) targetIdx = (bX - 1) + bY * cols; // Swipe Right
          else targetIdx = (bX + 1) + bY * cols;        // Swipe Left
        } else {
          // Vertical
          if (dy > 0) targetIdx = bX + (bY - 1) * cols; // Swipe Down
          else targetIdx = bX + (bY + 1) * cols;        // Swipe Up
        }

        if (targetIdx >= 0 && targetIdx < totalTiles) {
          // Check if the target is actually the neighbor (handles row wraps)
          if (isNeighbor(targetIdx, blankIdx)) moveTile(targetIdx);
        }
      }
      return false;
    }

    function moveTile(index) {
      let blankIndex = findEmpty();
      if (isNeighbor(index, blankIndex)) {
        swap(index, blankIndex);
        if (isSolved()) {
          puzzleSolved = true;
          let ox = (width - puzzleSize) / 2;
          let oy = (height - puzzleSize) / 2;
          saveBtn.position(ox + (puzzleSize / 2 - 65), oy + puzzleSize + 30);
          saveBtn.show();
        }
      }
    }

    function isNeighbor(i, j) {
      let x1 = i % cols, y1 = floor(i / cols);
      let x2 = j % cols, y2 = floor(j / cols);
      return abs(x1 - x2) + abs(y1 - y2) === 1;
    }

    function findEmpty() {
      return board.indexOf(-1);
    }

    function swap(i, j) {
      let temp = board[i];
      board[i] = board[j];
      board[j] = temp;
    }

    function shuffleBoard() {
      board[totalTiles - 1] = -1;
      for (let i = 0; i < 1000; i++) {
        let blank = findEmpty();
        let neighbors = [];
        for (let j = 0; j < totalTiles; j++) {
          if (isNeighbor(blank, j)) neighbors.push(j);
        }
        swap(blank, random(neighbors));
      }
    }

    function isSolved() {
      for (let i = 0; i < board.length - 1; i++) {
        if (board[i] !== i) return false;
      }
      return true;
    }

    function savePuzzleImage() {
      let ox = (width - puzzleSize) / 2;
      let oy = (height - puzzleSize) / 2;
      let finalPic = get(ox, oy, puzzleSize, puzzleSize);
      finalPic.save('my-solved-portrait', 'png');
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      updateLayout();
    }

    class Tile {
      constructor(index, sx, sy) {
        this.homeIndex = index;
        // Map the 400px source coords to the actual cam feed aspect ratio
        this.sx = map(sx, 0, 450, 0, 640);
        this.sy = map(sy, 0, 450, 0, 480);
      }
      display(x, y) {
        image(cam, x, y, w, h, this.sx, this.sy, 120, 120);
        stroke(255, 40);
        noFill();
        rect(x, y, w, h);
      }
    }
  </script>
</body>
</html>

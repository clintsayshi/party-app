<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>Live Cam Slide Puzzle | Interactive 5x5 Grid Game</title>
  <title>Live Cam Slide Puzzle | Interactive 5x5 Grid Game</title>
  <meta name="title" content="Live Cam Slide Puzzle | Interactive 5x5 Grid Game">
  <meta name="description" content="A real-time interactive slide puzzle game using your webcam. Shuffle, solve, and save your puzzle portrait in this 5x5 grid challenge built with p5.js.">
  <meta name="keywords" content="p5.js, slide puzzle, webcam game, interactive art, 15 puzzle, 25 puzzle, generative art">
  <meta name="author" content="Your Name/Brand">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://party-app-tau.vercel.app/">
  <meta property="og:title" content="Live Cam Slide Puzzle">
  <meta property="og:description" content="Can you solve the puzzle? Play a real-time slide puzzle using your live camera feed. Solve it to save your portrait!">
  <meta property="og:image" content="thumbnail-preview.jpg">

  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="Live Cam Slide Puzzle">
  <meta property="twitter:description" content="Interactive 5x5 slide puzzle game using your live camera feed. Solve the grid and download your photo.">

  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/addons/p5.sound.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #141414;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
    }

    canvas {
      display: block;
      touch-action: none; /* Prevents scrolling while playing on mobile */
    }

    /* Styling the p5-created button specifically via CSS for cleaner code */
    .save-button {
      background-color: #00ff96 !important;
      color: #141414 !important;
      padding: 15px 30px !important;
      border: none !important;
      border-radius: 5px !important;
      font-weight: bold !important;
      cursor: pointer !important;
      box-shadow: 0px 4px 15px rgba(0, 255, 150, 0.3);
      transition: transform 0.1s ease;
    }

    .save-button:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>
  <script>
    let cam;
    let tiles = [];
    let board = [];
    let cols = 5;
    let rows = 5;
    let w, h;
    let totalTiles = 25;
    let saveBtn;
    let puzzleSolved = false;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      
      // Initialize Camera at the puzzle resolution
      cam = createCapture(VIDEO);
      cam.size(500, 500);
      cam.hide();

      w = 500 / cols;
      h = 500 / rows;

      // Create Tile objects with their fixed source coordinates
      for (let i = 0; i < totalTiles; i++) {
        let x = (i % cols) * w;
        let y = floor(i / cols) * h;
        tiles.push(new Tile(i, x, y));
        board.push(i);
      }

      // UI: Save Button
      saveBtn = createButton('SAVE IMAGE');
      saveBtn.class('save-button');
      saveBtn.mousePressed(savePuzzleImage);
      saveBtn.hide();

      shuffleBoard();
    }

    function draw() {
      background(20);

      // Centering logic
      let offsetX = (width - 500) / 2;
      let offsetY = (height - 500) / 2;

      // Loading state for camera
      if (cam.width === 0) {
        fill(255);
        textAlign(CENTER, CENTER);
        text("Initializing Camera...", width / 2, height / 2);
        return;
      }

      push();
      translate(offsetX, offsetY);
      
      // Render the current board state
      for (let i = 0; i < board.length; i++) {
        let tileIndex = board[i];
        if (tileIndex !== -1) {
          let x = (i % cols) * w;
          let y = floor(i / cols) * h;
          tiles[tileIndex].display(x, y);
        }
      }

      // Check for win condition
      if (!puzzleSolved && isSolved()) {
        puzzleSolved = true;
        onSolve(offsetX, offsetY);
      }

      // Keep showing solved state
      if (puzzleSolved) {
        // Draw the missing piece to complete the picture
        tiles[totalTiles - 1].display(w * (cols - 1), h * (rows - 1));
        
        // Overlay
        fill(0, 255, 150, 220);
        rect(0, 210, 500, 80, 10);
        fill(255);
        textAlign(CENTER, CENTER);
        textSize(40);
        text("PUZZLE SOLVED!", 250, 250);
      }
      pop();
    }

    function onSolve(ox, oy) {
      saveBtn.position(ox + 165, oy + 310);
      saveBtn.show();
      // We don't use noLoop() immediately so the button can render
    }

    function savePuzzleImage() {
      let ox = (width - 500) / 2;
      let oy = (height - 500) / 2;
      // Capture the specific 500x500 puzzle area
      let finalPic = get(ox, oy, 500, 500);
      finalPic.save('solved-puzzle', 'png');
    }

    function mousePressed() {
      if (puzzleSolved) return;

      let offsetX = (width - 500) / 2;
      let offsetY = (height - 500) / 2;
      let mX = mouseX - offsetX;
      let mY = mouseY - offsetY;

      // Check if click is within puzzle bounds
      if (mX > 0 && mX < 500 && mY > 0 && mY < 500) {
        let i = floor(mX / w);
        let j = floor(mY / h);
        let clickedIndex = i + j * cols;
        moveTile(clickedIndex);
      }
    }

    function moveTile(index) {
      let blankIndex = findEmpty();
      if (isNeighbor(index, blankIndex)) {
        swap(index, blankIndex);
      }
    }

    function isNeighbor(i, j) {
      let x1 = i % cols, y1 = floor(i / cols);
      let x2 = j % cols, y2 = floor(j / cols);
      return abs(x1 - x2) + abs(y1 - y2) === 1;
    }

    function findEmpty() {
      for (let i = 0; i < board.length; i++) {
        if (board[i] === -1) return i;
      }
    }

    function swap(i, j) {
      let temp = board[i];
      board[i] = board[j];
      board[j] = temp;
    }

    function shuffleBoard() {
      board[totalTiles - 1] = -1;
      // High number of moves for a complex 5x5 shuffle
      for (let i = 0; i < 1500; i++) {
        let blank = findEmpty();
        let neighbors = [];
        for (let j = 0; j < totalTiles; j++) {
          if (isNeighbor(blank, j)) neighbors.push(j);
        }
        swap(blank, random(neighbors));
      }
    }

    function isSolved() {
      for (let i = 0; i < board.length - 1; i++) {
        if (board[i] !== i) return false;
      }
      return true;
    }

    class Tile {
      constructor(index, sx, sy) {
        this.homeIndex = index;
        this.sx = sx; // Source X from video
        this.sy = sy; // Source Y from video
      }
      display(x, y) {
        image(cam, x, y, w, h, this.sx, this.sy, w, h);
        stroke(255, 30);
        noFill();
        rect(x, y, w, h);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      if (puzzleSolved) {
        let ox = (width - 500) / 2;
        let oy = (height - 500) / 2;
        saveBtn.position(ox + 165, oy + 310);
      }
    }
  </script>
</body>
</html>
